<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Thread Track</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Custom Stylesheet -->
  <link href="style.css" rel="stylesheet">
</head>
<body class="login-body">
  <div class="container d-flex justify-content-center align-items-center">
    <div class="card-custom login-card">
      <div class="text-center mb-4">
        <h2 class="navbar-brand d-inline-flex align-items-center fs-2">
          <i class="bi bi-activity me-2"></i>THREAD TRACK
        </h2>
        <p class="text-muted mt-2">Saree Manufacturing Management System</p>
      </div>
      
      <!-- Alert Container -->
      <div id="alert-container"></div>
      
      <form id="login-form">
        <div class="mb-3">
          <label for="username" class="form-label font-semibold text-muted">Email or Mobile Number</label>
          <div class="input-group">
            <span class="input-group-text" style="background-color: var(--bg-color); border-color: var(--border-color);"><i class="bi bi-person text-muted"></i></span>
            <input type="text" class="form-control" id="username" placeholder="e.g. admin@threadtrack.com" required style="border-left: none; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; border-color: var(--border-color); color: var(--text-main); background-color: var(--card-bg);">
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label font-semibold text-muted">Password</label>
          <div class="input-group">
            <span class="input-group-text" style="background-color: var(--bg-color); border-color: var(--border-color);"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required style="border-left: none; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; border-color: var(--border-color); color: var(--text-main); background-color: var(--card-bg);">
          </div>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100 py-3 d-flex align-items-center justify-content-center gap-2" id="submit-btn">
          <span class="spinner-border spinner-border-sm d-none" id="login-spinner" role="status" aria-hidden="true"></span>
          <span>Login</span>
        </button>
      </form>
      
      <div class="text-center mt-4">
        <small class="text-muted">Contact Super Admin to register a new user account.</small>
      </div>
    </div>
  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Config and Common Script -->
  <script src="config.js"></script>
  <script src="common.js"></script>
  
  <script>
    $(document).ready(function() {
      $('#login-form').on('submit', async function(e) {
        e.preventDefault();
        
        const username = $('#username').val().trim();
        const password = $('#password').val();
        
        const $submitBtn = $('#submit-btn');
        const $spinner = $('#login-spinner');
        
        $submitBtn.prop('disabled', true);
        $spinner.removeClass('d-none');
        
        try {
          // Attempt to get client IP for audit log
          let ipAddress = 'N/A';
          try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            ipAddress = ipData.ip;
          } catch(err) {
            console.log("Could not resolve IP address, using fallback.");
          }
          
          const result = await callApi('login', {}, true, {
            email: username,
            password: password,
            ipAddress: ipAddress
          });
          
          if (result.success) {
            localStorage.setItem('user_session', JSON.stringify(result.user));
            window.location.href = 'index.html';
          } else {
            showAlert(result.error || 'Authentication failed', 'danger');
          }
        } catch(error) {
          console.error(error);
          showAlert(error.message || 'Incorrect credentials or connection error', 'danger');
        } finally {
          $submitBtn.prop('disabled', false);
          $spinner.addClass('d-none');
        }
      });
    });
  </script>
</body>
</html>
